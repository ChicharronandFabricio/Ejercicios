<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi botón animado</title>
    <link rel="stylesheet" href="Portada_1.css">
</head>
<body>

<!-- Pantalla inicio -->
<div id="inicio">
    <button id="btnBienvenido">
        <span>Bienvenido Alonso</span>
    </button>
</div>

<!-- Pantalla interfaz -->
<div id="interfaz">
    <div class="headerBienvenida">
        <h1 class="bienvenida">Bienvenido Alonso</h1>
        <img src="pelota.png" class="imgBienvenida" alt="Pelota">
    </div>

    <div class="contenedor">
        <div class="izquierda">
            <div class="modulo">
                <button class="btnModulo" id="btnEjercicios">Ejercicios</button>
            </div>
            <div class="modulo">
                <button class="btnModulo" id="btnPeso">Peso</button>
            </div>
            <div class="modulo">
                <button class="btnModulo" id="btnCalendario">Calendario</button>
            </div>
        </div>

        <div class="derecha">
            <div class="panelDerecho">
                <div id="hora" class="hora"></div>
                <div id="fecha" class="fecha"></div>
                <div id="contenido" class="contenido"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
